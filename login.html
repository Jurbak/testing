<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#7c9a84">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Login Pengurus - Kas Santri</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Login Pengurus</h1>
      <p class="login-subtitle">Masuk untuk mengelola data kas santri</p>

      <div id="alertContainer"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input type="email" id="email" class="form-input" placeholder="email@contoh.com" required>
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Masukkan password" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
          Masuk
        </button>
      </form>

      <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        <a href="index.html" style="color: var(--primary); text-decoration: none;">&larr; Kembali ke Beranda</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pwa.js"></script>
  <script>
    const loginForm = document.getElementById('loginForm');
    const alertContainer = document.getElementById('alertContainer');

    async function checkExistingSession() {
      const session = await checkAuth();
      if (session) {
        window.location.href = 'admin.html';
      }
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const submitBtn = loginForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      try {
        await login(email, password);
        window.location.href = 'admin.html';
      } catch (error) {
        alertContainer.innerHTML = `
          <div class="alert alert-danger">
            ${error.message === 'Invalid login credentials' ? 'Email atau password salah' : error.message}
          </div>
        `;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Masuk';
      }
    });

    checkExistingSession();
  </script>
</body>
</html>
